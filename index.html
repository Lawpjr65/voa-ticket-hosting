<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOA Tickets</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101114;
      color: #f5f5f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      max-width: 720px;
      width: 100%;
      border: 1px solid #f96302;
      padding: 28px;
      background: #050505;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 12px;
      color: #d9d9d9;
      line-height: 1.45;
    }

    code {
      color: #f96302;
    }
  </style>
</head>
<body>
  <main>
    <h1>VOA Tickets</h1>
    <p>Tickets are hosted as direct PNG files for download.</p>
    <p>QR codes should link to <code>/tickets/ticket-file-name.png</code>.</p>
  </main>
</body>
</html>
