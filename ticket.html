<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOA Ticket Access</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101114;
      color: #f5f5f5;
      --orange: #f96302;
      --gold: #d4af37;
      --cream: #fff1d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 25%, rgba(249, 99, 2, 0.16), transparent 34%),
        linear-gradient(180deg, #050506 0%, #101114 52%, #050506 100%);
      overflow-x: hidden;
    }

    main {
      width: min(100%, 760px);
      border: 1px solid var(--orange);
      padding: 24px;
      background: rgba(5, 5, 5, 0.92);
      box-shadow: 0 0 34px rgba(249, 99, 2, 0.22);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: #d8d8d8;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #444;
      border-radius: 0;
      padding: 10px 12px;
      background: #ffffff;
      color: #111111;
      font: inherit;
    }

    button,
    a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      padding: 0 18px;
      background: #f96302;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .error {
      min-height: 22px;
      color: #ffb199;
      font-weight: 700;
    }

    .ticket {
      display: none;
      gap: 16px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #020202;
      overflow: hidden;
      animation: introFade 0.55s ease 4.65s forwards;
    }

    .intro.hidden {
      display: none;
    }

    .curtain {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.28) 0 14px, rgba(255, 255, 255, 0.035) 14px 24px),
        linear-gradient(180deg, #1b0602, #050202 62%);
      animation: lightsDim 1.1s ease forwards;
    }

    .projector {
      position: absolute;
      left: 7%;
      top: 48%;
      width: 90px;
      height: 54px;
      border: 2px solid #2e2e2e;
      background: #070707;
      box-shadow: 0 0 18px rgba(255, 241, 208, 0.18);
      opacity: 0;
      animation: projectorStart 0.55s ease 0.75s forwards;
    }

    .projector::before,
    .projector::after {
      content: "";
      position: absolute;
      top: -38px;
      width: 46px;
      height: 46px;
      border: 5px dotted var(--cream);
      border-radius: 999px;
      opacity: 0.78;
      animation: reelSpin 1.05s linear 0.85s infinite;
    }

    .projector::before {
      left: -4px;
    }

    .projector::after {
      right: -4px;
      animation-direction: reverse;
    }

    .beam {
      position: absolute;
      left: calc(7% + 82px);
      top: 42%;
      width: 58vw;
      height: 22vh;
      background: linear-gradient(90deg, rgba(255, 241, 208, 0.52), rgba(255, 241, 208, 0.08), transparent);
      clip-path: polygon(0 45%, 100% 0, 100% 100%, 0 55%);
      opacity: 0;
      filter: blur(1px);
      animation: beamOn 0.7s ease 1.05s forwards, beamFlicker 0.18s linear 1.75s 7;
    }

    .spotlight {
      position: absolute;
      inset: auto auto 8% 50%;
      width: 76vw;
      max-width: 720px;
      height: 52vh;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(255, 241, 208, 0.34), rgba(249, 99, 2, 0.09) 42%, transparent 70%);
      opacity: 0;
      animation: spotlightOn 0.9s ease 1.7s forwards;
    }

    .screen {
      position: relative;
      width: min(88vw, 680px);
      min-height: 360px;
      border: 2px solid rgba(249, 99, 2, 0.92);
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.82)),
        radial-gradient(circle at 50% 25%, rgba(212, 175, 55, 0.18), transparent 42%),
        #080808;
      box-shadow: 0 0 42px rgba(249, 99, 2, 0.3), inset 0 0 70px rgba(0, 0, 0, 0.88);
      display: grid;
      place-items: center;
      padding: 28px;
      transform: translateY(95vh) scale(0.94);
      animation: screenSlide 0.9s cubic-bezier(.2,.9,.2,1) 2.05s forwards;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(212, 175, 55, 0.5);
      pointer-events: none;
    }

    .screen-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.42;
      background: #080808;
    }

    .mission {
      position: relative;
      z-index: 1;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mission .eyebrow {
      color: var(--gold);
      font-weight: 800;
      font-size: clamp(12px, 2.6vw, 18px);
      margin-bottom: 12px;
    }

    .mission h2 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(34px, 11vw, 78px);
      line-height: 0.92;
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.55);
    }

    .mission .line {
      margin-top: 18px;
      color: var(--orange);
      font-weight: 900;
      font-size: clamp(17px, 4vw, 28px);
      letter-spacing: 0.03em;
    }

    .skip {
      position: absolute;
      right: 16px;
      bottom: 16px;
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 14px;
      z-index: 12;
    }

    main {
      opacity: 0;
      transform: translateY(10px);
      animation: pageReveal 0.55s ease 4.85s forwards;
    }

    @keyframes lightsDim {
      from { filter: brightness(1.15); }
      to { filter: brightness(0.28); }
    }

    @keyframes projectorStart {
      to { opacity: 1; }
    }

    @keyframes reelSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes beamOn {
      to { opacity: 1; }
    }

    @keyframes beamFlicker {
      50% { opacity: 0.48; }
    }

    @keyframes spotlightOn {
      to { opacity: 1; }
    }

    @keyframes screenSlide {
      to { transform: translateY(0) scale(1); }
    }

    @keyframes introFade {
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes pageReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro {
        display: none;
      }

      main {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <section id="intro" class="intro" aria-label="Movie ticket intro">
    <div class="curtain"></div>
    <div class="projector" aria-hidden="true"></div>
    <div class="beam" aria-hidden="true"></div>
    <div class="spotlight" aria-hidden="true"></div>
    <div class="screen">
      <img id="screen-art" class="screen-art" alt="" hidden>
      <div class="mission">
        <div class="eyebrow">1109 Cinemas Presents</div>
        <h2>Survey<br>Mission</h2>
        <div class="line">Your voice gets the spotlight.</div>
      </div>
    </div>
    <button id="skip-intro" class="skip" type="button">Skip</button>
  </section>

  <main>
    <section id="gate">
      <h1>VIP Ticket Access</h1>
      <p>Every associate has a voice. Enter your ticket number to unlock your digital premiere pass.</p>
      <form id="access-form">
        <div>
          <label for="ticket-number">Ticket Number</label>
          <input id="ticket-number" name="ticket-number" type="password" autocomplete="off" required>
        </div>
        <div class="actions">
          <button type="submit">Open Ticket</button>
          <span id="error" class="error" role="alert"></span>
        </div>
      </form>
    </section>

    <section id="ticket" class="ticket">
      <h1>Your Ticket</h1>
      <img id="ticket-image" alt="VOA movie ticket">
      <div class="actions">
        <a id="download-link" class="download" download>Download Image</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "";
    const expectedHash = (params.get("code") || "").toLowerCase();
    const gate = document.getElementById("gate");
    const ticket = document.getElementById("ticket");
    const form = document.getElementById("access-form");
    const input = document.getElementById("ticket-number");
    const error = document.getElementById("error");
    const image = document.getElementById("ticket-image");
    const download = document.getElementById("download-link");
    const intro = document.getElementById("intro");
    const skipIntro = document.getElementById("skip-intro");
    const screenArt = document.getElementById("screen-art");
    const introArtwork = params.get("artwork") || "";

    function validTicketFile(value) {
      return /^[A-Za-z0-9._% -]+\.png$/.test(value);
    }

    function validArtworkFile(value) {
      return /^[A-Za-z0-9._% -]+\.(png|jpg|jpeg|webp)$/i.test(value);
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value.trim());
      const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(hashBuffer))
        .map(byte => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function showTicket() {
      const ticketUrl = `tickets/${encodeURIComponent(file)}`;
      image.src = ticketUrl;
      download.href = ticketUrl;
      download.download = file;
      gate.style.display = "none";
      ticket.style.display = "grid";
    }

    function hideIntro() {
      intro.classList.add("hidden");
    }

    if (validArtworkFile(introArtwork)) {
      screenArt.src = `artwork/${encodeURIComponent(introArtwork)}`;
      screenArt.hidden = false;
    }

    skipIntro.addEventListener("click", hideIntro);
    intro.addEventListener("animationend", event => {
      if (event.animationName === "introFade") {
        hideIntro();
      }
    });

    if (!validTicketFile(file) || !expectedHash) {
      error.textContent = "This ticket link is incomplete.";
      input.disabled = true;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      error.textContent = "";

      const enteredHash = await sha256(input.value);
      if (enteredHash !== expectedHash) {
        error.textContent = "Ticket number does not match this ticket.";
        return;
      }

      showTicket();
    });
  </script>
</body>
</html>
