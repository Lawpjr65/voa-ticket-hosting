<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOA Ticket Access</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101114;
      color: #f5f5f5;
      --orange: #f96302;
      --gold: #d4af37;
      --cream: #fff1d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      align-items: start;
      justify-items: center;
      padding: 20px;
      background: #020202;
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 28%, rgba(249, 99, 2, 0.14), transparent 36%);
      pointer-events: none;
    }

    main {
      width: min(100%, 760px);
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: #d8d8d8;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #444;
      border-radius: 0;
      padding: 10px 12px;
      background: #ffffff;
      color: #111111;
      font: inherit;
    }

    button,
    a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      padding: 0 18px;
      background: #f96302;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .download-actions {
      align-items: stretch;
      flex-direction: column;
    }

    .download-actions a.download {
      width: 100%;
    }

    .error {
      min-height: 22px;
      color: #ffb199;
      font-weight: 700;
    }

    .ticket {
      display: none;
      gap: 16px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
    }

    .intro {
      position: relative;
      width: 100%;
      min-height: 230px;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: 20px;
      background: transparent;
      overflow: hidden;
    }

    .curtain {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.28) 0 14px, rgba(255, 255, 255, 0.035) 14px 24px),
        linear-gradient(180deg, #1b0602, #050202 62%);
      animation: lightsDim 1.1s ease forwards;
    }

    .projector {
      position: absolute;
      left: 7%;
      top: 48%;
      width: 90px;
      height: 54px;
      border: 2px solid #2e2e2e;
      background: #070707;
      box-shadow: 0 0 18px rgba(255, 241, 208, 0.18);
      opacity: 0;
      animation: projectorStart 0.55s ease 1s forwards;
    }

    .projector::before,
    .projector::after {
      content: "";
      position: absolute;
      top: -38px;
      width: 46px;
      height: 46px;
      border: 5px dotted var(--cream);
      border-radius: 999px;
      opacity: 0.78;
      animation: reelSpin 1.05s linear 1.1s infinite;
    }

    .projector::before {
      left: -4px;
    }

    .projector::after {
      right: -4px;
      animation-direction: reverse;
    }

    .beam {
      position: absolute;
      left: calc(7% + 82px);
      top: 42%;
      width: 58vw;
      height: 22vh;
      background: linear-gradient(90deg, rgba(255, 241, 208, 0.52), rgba(255, 241, 208, 0.08), transparent);
      clip-path: polygon(0 45%, 100% 0, 100% 100%, 0 55%);
      opacity: 0;
      filter: blur(1px);
      animation: beamOn 0.7s ease 1.4s forwards, beamFlicker 0.18s linear 2.3s 7;
    }

    .spotlight {
      position: absolute;
      inset: auto auto 0 50%;
      width: 76vw;
      max-width: 720px;
      height: 220px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(255, 241, 208, 0.34), rgba(249, 99, 2, 0.09) 42%, transparent 70%);
      opacity: 0;
      animation: spotlightOn 0.9s ease 2.6s forwards;
    }

    .poster-showcase {
      position: relative;
      z-index: 2;
      width: min(88vw, 430px);
      justify-self: center;
      aspect-ratio: 4 / 5;
      margin-top: -230px;
      opacity: 0;
      transform: translateY(16px) scale(0.98);
      animation: posterReveal 0.8s ease 5s forwards;
    }

    .poster-showcase::before {
      content: "";
      position: absolute;
      inset: -10px;
      border: 1px solid rgba(249, 99, 2, 0.5);
      box-shadow: 0 0 36px rgba(249, 99, 2, 0.2);
      pointer-events: none;
    }

    .poster-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #080808;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.54);
    }

    .mission-panel {
      opacity: 0;
      transform: translateY(12px) scale(0.98);
      animation: missionReveal 0.7s ease 7s forwards;
    }

    .mission {
      position: relative;
      z-index: 1;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mission .eyebrow {
      color: var(--gold);
      font-weight: 800;
      font-size: clamp(12px, 2.6vw, 18px);
      margin-bottom: 8px;
    }

    .mission .pretitle {
      color: var(--cream);
      font-weight: 900;
      font-size: clamp(20px, 6vw, 42px);
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.55);
    }

    .mission .line {
      margin-top: 16px;
      color: var(--orange);
      font-weight: 900;
      font-size: clamp(17px, 4vw, 28px);
      letter-spacing: 0.03em;
    }

    #gate {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      padding: 24px;
      background: rgba(5, 5, 5, 0.76);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(249, 99, 2, 0.58);
      box-shadow: 0 0 34px rgba(249, 99, 2, 0.22);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    body.gate-ready #gate {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @keyframes lightsDim {
      from { filter: brightness(1.15); }
      to { filter: brightness(0.28); }
    }

    @keyframes projectorStart {
      to { opacity: 1; }
    }

    @keyframes reelSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes beamOn {
      to { opacity: 1; }
    }

    @keyframes beamFlicker {
      50% { opacity: 0.48; }
    }

    @keyframes spotlightOn {
      to { opacity: 1; }
    }

    @keyframes posterReveal {
      to { opacity: 1; }
    }

    @keyframes missionReveal {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .poster-showcase,
      .mission-panel,
      #gate {
        opacity: 1;
        transform: none;
        animation: none;
      }

      #gate {
        pointer-events: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <section id="intro" class="intro" aria-label="Movie ticket intro">
      <div class="curtain"></div>
      <div class="projector" aria-hidden="true"></div>
      <div class="beam" aria-hidden="true"></div>
      <div class="spotlight" aria-hidden="true"></div>
    </section>

    <section class="poster-showcase" aria-label="Movie poster artwork">
      <img id="poster-art" class="poster-art" alt="Movie poster artwork" hidden>
    </section>

    <section class="mission-panel" aria-label="Survey mission">
      <div class="mission">
        <div class="pretitle">Now Showing</div>
        <div class="eyebrow">1109 Cinemas Presents</div>
        <div class="line">Your voice gets the spotlight.</div>
      </div>
    </section>

    <section id="gate">
      <h1>VIP Ticket Access</h1>
      <p>Every associate has a voice. Enter your ticket number to unlock your digital premiere pass.</p>
      <form id="access-form">
        <div>
          <label for="ticket-number">Ticket Number</label>
          <input id="ticket-number" name="ticket-number" type="password" autocomplete="off" required>
        </div>
        <div class="actions">
          <button type="submit">Open Ticket</button>
          <span id="error" class="error" role="alert"></span>
        </div>
      </form>
    </section>

    <section id="ticket" class="ticket">
      <h1>Your Ticket</h1>
      <img id="ticket-image" alt="VOA movie ticket">
      <div class="actions download-actions">
        <a id="download-link" class="download" download>Download Ticket</a>
        <a id="poster-download-link" class="download" download hidden>Download Poster</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "";
    const expectedHash = (params.get("code") || "").toLowerCase();
    const gate = document.getElementById("gate");
    const ticket = document.getElementById("ticket");
    const form = document.getElementById("access-form");
    const input = document.getElementById("ticket-number");
    const error = document.getElementById("error");
    const image = document.getElementById("ticket-image");
    const download = document.getElementById("download-link");
    const posterDownload = document.getElementById("poster-download-link");
    const posterArt = document.getElementById("poster-art");
    const introArtwork = params.get("poster") || params.get("artwork") || "ASSISTANT_MGRS_Training_Day_Poster.png";

    function validTicketFile(value) {
      return /^[A-Za-z0-9._% -]+\.png$/.test(value);
    }

    function validArtworkFile(value) {
      return /^[A-Za-z0-9._% -]+\.(png|jpg|jpeg|webp)$/i.test(value);
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value.trim());
      const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(hashBuffer))
        .map(byte => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function showTicket() {
      const ticketUrl = `tickets/${encodeURIComponent(file)}`;
      image.src = ticketUrl;
      download.href = ticketUrl;
      download.download = file;
      gate.style.display = "none";
      ticket.style.display = "grid";
    }

    function showGate() {
      document.body.classList.add("gate-ready");
    }

    if (validArtworkFile(introArtwork)) {
      const artworkUrl = `artwork/${encodeURIComponent(introArtwork)}`;
      posterArt.src = artworkUrl;
      posterArt.hidden = false;
      posterDownload.href = artworkUrl;
      posterDownload.download = introArtwork;
      posterDownload.hidden = false;
    }

    const gateTimer = window.setTimeout(showGate, 9000);

    if (!validTicketFile(file) || !expectedHash) {
      error.textContent = "This ticket link is incomplete.";
      input.disabled = true;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      error.textContent = "";

      const enteredHash = await sha256(input.value);
      if (enteredHash !== expectedHash) {
        error.textContent = "Ticket number does not match this ticket.";
        return;
      }

      showTicket();
    });
  </script>
</body>
</html>
