<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VOA Ticket Access</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101114;
      color: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #101114;
    }

    main {
      width: min(100%, 760px);
      border: 1px solid #f96302;
      padding: 24px;
      background: #050505;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: #d8d8d8;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #444;
      border-radius: 0;
      padding: 10px 12px;
      background: #ffffff;
      color: #111111;
      font: inherit;
    }

    button,
    a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      padding: 0 18px;
      background: #f96302;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .error {
      min-height: 22px;
      color: #ffb199;
      font-weight: 700;
    }

    .ticket {
      display: none;
      gap: 16px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <section id="gate">
      <h1>Ticket Access</h1>
      <p>Enter your Associate ID to view and download your movie ticket.</p>
      <form id="access-form">
        <div>
          <label for="associate-id">Associate ID</label>
          <input id="associate-id" name="associate-id" type="password" inputmode="numeric" autocomplete="off" required>
        </div>
        <div class="actions">
          <button type="submit">Open Ticket</button>
          <span id="error" class="error" role="alert"></span>
        </div>
      </form>
    </section>

    <section id="ticket" class="ticket">
      <h1>Your Ticket</h1>
      <img id="ticket-image" alt="VOA movie ticket">
      <div class="actions">
        <a id="download-link" class="download" download>Download Image</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "";
    const expectedHash = (params.get("code") || "").toLowerCase();
    const gate = document.getElementById("gate");
    const ticket = document.getElementById("ticket");
    const form = document.getElementById("access-form");
    const input = document.getElementById("associate-id");
    const error = document.getElementById("error");
    const image = document.getElementById("ticket-image");
    const download = document.getElementById("download-link");

    function validTicketFile(value) {
      return /^[A-Za-z0-9._% -]+\.png$/.test(value);
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value.trim());
      const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(hashBuffer))
        .map(byte => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function showTicket() {
      const ticketUrl = `tickets/${encodeURIComponent(file)}`;
      image.src = ticketUrl;
      download.href = ticketUrl;
      download.download = file;
      gate.style.display = "none";
      ticket.style.display = "grid";
    }

    if (!validTicketFile(file) || !expectedHash) {
      error.textContent = "This ticket link is incomplete.";
      input.disabled = true;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      error.textContent = "";

      const enteredHash = await sha256(input.value);
      if (enteredHash !== expectedHash) {
        error.textContent = "Associate ID does not match this ticket.";
        return;
      }

      showTicket();
    });
  </script>
</body>
</html>
